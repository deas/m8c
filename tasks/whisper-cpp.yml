---
- name: Ensure whisper.cpp models directory exists
  file:
    path: "{{ whisper_cpp_models_dir | expanduser }}"
    state: directory
    mode: '0755'

- name: Check if whisper.cpp models exist
  stat:
    path: "{{ whisper_cpp_models_dir | expanduser }}/ggml-{{ item }}.bin"
  loop: "{{ whisper_cpp_models }}"
  register: model_stat

- name: Download whisper.cpp models
  get_url:
    url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-{{ item }}.bin"
    dest: "{{ whisper_cpp_models_dir | expanduser }}/ggml-{{ item }}.bin"
    mode: '0644'
  loop: "{{ whisper_cpp_models }}"
  loop_control:
    index_var: model_index
  when: "not model_stat.results[model_index].stat.exists"
  register: model_download
  until: model_download is succeeded
  retries: 3
  delay: 5

- name: Create whisper-server LaunchAgent plist
  template:
    src: whisper-cpp-server.plist.j2
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.whisper-cpp.server.plist"
    mode: '0644'
  when: whisper_cpp_server_enabled

- name: Report whisper.cpp status
  debug:
    msg: "whisper.cpp configured. To start the server, run: launchctl load {{ ansible_env.HOME }}/Library/LaunchAgents/com.whisper-cpp.server.plist"
