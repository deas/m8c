- name: Ensure Tailscale and Ollama are started (bypass JSON parse error)
  block:
    - name: Start Tailscale service
      # TODO: restart more robust than start which fails when already started : Bootstrap failed: 5: Input/output error
      command: sudo /opt/homebrew/bin/brew services restart tailscale
      environment:
        HOMEBREW_SERVICES_NO_DOMAIN_WARNING: "1"
        HOMEBREW_NO_ENV_HINTS: "1"
      register: tailscale_start
      # become: true
      changed_when: "'Service `tailscale` already started' not in tailscale_start.stdout"
    - name: Set Ollama to listen on all interfaces
      command: launchctl setenv OLLAMA_HOST "0.0.0.0"
    # - name: Ensure Ollama plist has OLLAMA_HOST set to 0.0.0.0
    #   community.general.osx_defaults:
    #     domain: "/Users/{{ ansible_user }}/Library/LaunchAgents/homebrew.mxcl.ollama.plist"
    #     key: "EnvironmentVariables"
    #     type: "dict"
    #     value:
    #       OLLAMA_HOST: "0.0.0.0"
    #   register: ollama_config
    - name: Start Ollama service
      command: /opt/homebrew/bin/brew services restart ollama
      environment:
        HOMEBREW_SERVICES_NO_DOMAIN_WARNING: "1"
        HOMEBREW_NO_ENV_HINTS: "1"
      # register: ollama_start
      ##  when: ollama_start is failed
      # when: ollama_config.changed or (ollama_start is failed)
      # changed_when: "'Service `ollama` already started' not in ollama_start.stdout"
