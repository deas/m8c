- name: Check if Tailscale is authenticated
  command: tailscale status
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Print Tailscale login URL if not authenticated
  debug:
    msg: "Tailscale is installed but not authenticated. Run 'sudo tailscale up' to log in."
  when: "'Logged out' in tailscale_status.stdout or tailscale_status.rc != 0"
